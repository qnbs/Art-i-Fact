# GitHub Actions Workflow: Deploy Art-i-Fact to GitHub Pages
#
# Uses the official GitHub Pages deployment actions (2025/2026 pattern).
#
# Prerequisites:
#   1. Go to Settings → Pages → Source → GitHub Actions
#   2. No API key secrets needed — users enter their own key in-app
#
# Trigger: Push to main branch or manual dispatch

name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Required permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout
        uses: actions/checkout@v5

      # Step 2: Set up Node.js with npm caching
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      # Step 3: Install dependencies (clean install for CI)
      - name: Install dependencies
        run: npm ci

      # Step 4: Build the project
      # No GEMINI_API_KEY is set intentionally — users enter their key in-app
      - name: Build
        run: npm run build

      # Step 5: Configure GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Step 6: Upload the build artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "./dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      # Step 7: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
